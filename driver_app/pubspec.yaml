name: driver_app
description: Driver/Delivery application for Alhai grocery stores
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ⭐ الحزم المشتركة (Priority)
  alhai_core:
    path: ../alhai_core
  alhai_design_system:
    path: ../alhai_design_system

  # State Management (DI + ViewModels)
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Routing
  go_router: ^13.0.0

  # Backend
  supabase_flutter: ^2.3.4
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0

  # UI helpers
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

  # ==========================================
  # 🚗 DRIVER-SPECIFIC DEPENDENCIES
  # ==========================================
  
  # Maps & Navigation
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  flutter_polyline_points: ^2.0.0
  
  # Background Location Tracking
  flutter_background_service: ^5.0.1
  flutter_background_geolocation: ^4.14.4
  
  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # Camera (for delivery proof)
  camera: ^0.10.5+9
  
  # Signature capture
  signature: ^5.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.4.1

  # Linting
  flutter_lints: ^3.0.1

  # Testing
  mockito: ^5.4.4
  faker: ^2.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
