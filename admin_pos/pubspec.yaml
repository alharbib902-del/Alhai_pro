name: admin_pos
description: Admin dashboard for Alhai POS - Web + Mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ⭐ الحزم المشتركة
  alhai_core:
    path: ../alhai_core
  alhai_design_system:
    path: ../alhai_design_system

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Routing
  go_router: ^13.0.0

  # Backend
  supabase_flutter: ^2.3.4
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3

  # UI helpers
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

  # ==========================================
  # 📊 ADMIN-SPECIFIC: Charts & Tables
  # ==========================================
  fl_chart: ^0.65.0
  data_table_2: ^2.5.10
  syncfusion_flutter_charts: ^24.2.0
  
  # File handling
  file_picker: ^6.1.1
  excel: ^4.0.2
  pdf: ^3.10.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.4.1
  flutter_lints: ^3.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
