name: super_admin
description: Super Admin dashboard for Alhai Platform - Web only
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  alhai_core:
    path: ../alhai_core
  alhai_design_system:
    path: ../alhai_design_system

  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  get_it: ^7.6.4
  injectable: ^2.3.2
  go_router: ^13.0.0
  supabase_flutter: ^2.3.4
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0

  # Charts & Tables for multi-tenant dashboard
  fl_chart: ^0.65.0
  data_table_2: ^2.5.10
  syncfusion_flutter_charts: ^24.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
