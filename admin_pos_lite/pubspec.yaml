name: admin_pos_lite
description: Lite admin dashboard for Alhai POS - Mobile only
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ⭐ الحزم المشتركة
  alhai_core:
    path: ../alhai_core
  alhai_services:
    path: ../alhai_services
  alhai_design_system:
    path: ../alhai_design_system

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Routing
  go_router: ^13.0.0

  # Backend
  supabase_flutter: ^2.3.4
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.20.2

  # UI helpers
  shimmer: ^3.0.0

  # Lite charts
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.4.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
