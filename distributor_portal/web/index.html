<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Distributor Portal - Alhai Platform">

  <!-- Security headers — fallback only. Canonical source is web/_headers
       (Cloudflare Pages), nginx.conf (Docker), and vercel.json (Vercel). -->
  <!-- NOTE: <meta http-equiv="Content-Security-Policy"> cannot carry the
       Report-To HTTP header — that directive is header-only. Reporting is
       wired via web/_headers, nginx.conf, and vercel.json. The meta tag
       carries only the legacy `report-uri` directive as a fallback. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io https://*.ingest.sentry.io; base-uri 'self'; form-action 'self'; object-src 'none'; report-uri https://__SENTRY_CSP_REPORT_URI__/">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="noindex, nofollow">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="distributor_portal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>distributor_portal</title>

  <!-- Print-friendly styles for invoice printing -->
  <style>
    @media print {
      /* Force colors on print */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* A4 page size */
      @page {
        size: A4;
        margin: 10mm;
      }

      /* Reset margins for print */
      body {
        margin: 0;
        padding: 10mm;
        background: white !important;
        color: black !important;
        font-size: 11pt;
        line-height: 1.4;
      }

      /* Prevent page breaks in the middle of sections */
      .invoice-section {
        page-break-inside: avoid;
      }
    }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
