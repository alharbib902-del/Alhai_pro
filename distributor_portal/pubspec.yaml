name: distributor_portal
description: Distributor Portal for Alhai Platform - Web only
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  alhai_core:
    path: ../alhai_core
  alhai_design_system:
    path: ../alhai_design_system
  alhai_l10n:
    path: ../packages/alhai_l10n

  flutter_riverpod: ^2.4.9
  get_it: ^7.7.0
  injectable: ^2.3.2
  go_router: ^13.0.0
  supabase_flutter: ^2.3.4
  http: any
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
