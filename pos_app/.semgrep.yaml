# Semgrep Rules for Dart/Flutter Security
# https://semgrep.dev/docs/writing-rules/overview/

rules:
  # Detect hardcoded secrets
  - id: dart-hardcoded-api-key
    patterns:
      - pattern-either:
          - pattern: |
              $X = "sk-$Y"
          - pattern: |
              $X = "pk_$Y"
          - pattern: |
              const $X = "eyJ$Y"
    message: "Potential hardcoded API key or JWT token detected"
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.dart"
      exclude:
        - "*_test.dart"
        - "test/**"

  # Detect insecure HTTP URLs
  - id: dart-insecure-http
    pattern-regex: 'http://(?!localhost|127\.0\.0\.1|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)[^\s"\']+'
    message: "Insecure HTTP URL detected. Use HTTPS instead."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "*.dart"
      exclude:
        - "*_test.dart"
        - "test/**"

  # Detect potential SQL injection (even with Drift ORM)
  - id: dart-raw-sql-query
    patterns:
      - pattern-either:
          - pattern: |
              customSelect($QUERY, ...)
          - pattern: |
              customStatement($QUERY, ...)
    message: "Raw SQL query detected. Ensure proper parameterization to prevent SQL injection."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "*.dart"

  # Detect debugPrint without kDebugMode
  - id: dart-unguarded-debug-print
    pattern-regex: '(?<!if\s*\(kDebugMode\)\s*\{?\s*)debugPrint\s*\('
    message: "debugPrint should be wrapped with kDebugMode check in production code"
    severity: INFO
    languages: [generic]
    paths:
      include:
        - "lib/**/*.dart"
      exclude:
        - "*_test.dart"
        - "test/**"

  # Detect potential path traversal
  - id: dart-path-traversal
    pattern-regex: '\.\./'
    message: "Potential path traversal pattern detected"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "*.dart"
      exclude:
        - "*_test.dart"
        - "pubspec.yaml"

  # Detect hardcoded passwords
  - id: dart-hardcoded-password
    patterns:
      - pattern-regex: 'password\s*[:=]\s*["\'][^"\']{4,}["\']'
    message: "Potential hardcoded password detected"
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.dart"
      exclude:
        - "*_test.dart"
        - "test/**"

  # Detect disabled SSL verification
  - id: dart-disabled-ssl
    patterns:
      - pattern-either:
          - pattern: |
              badCertificateCallback: ($CLIENT, $X, $Y) => true
          - pattern: |
              onBadCertificate: ($CERT) => true
    message: "SSL certificate verification is disabled. This is insecure."
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.dart"

  # Detect weak cryptographic algorithms
  - id: dart-weak-crypto
    patterns:
      - pattern-either:
          - pattern: |
              md5.$X
          - pattern: |
              Md5()
          - pattern: |
              sha1.$X
    message: "Weak cryptographic algorithm detected. Use SHA-256 or stronger."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "*.dart"
      exclude:
        - "*_test.dart"

  # Detect potential command injection
  - id: dart-command-injection
    patterns:
      - pattern-either:
          - pattern: |
              Process.run($CMD, ...)
          - pattern: |
              Process.start($CMD, ...)
    message: "Command execution detected. Ensure input is properly sanitized."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "*.dart"

  # Detect eval-like patterns
  - id: dart-eval-pattern
    patterns:
      - pattern-either:
          - pattern: |
              Function($CODE)
          - pattern: |
              eval($CODE)
    message: "Dynamic code execution detected. This can lead to code injection."
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.dart"

  # Detect missing null checks on security-critical data
  - id: dart-unchecked-user-input
    pattern-regex: 'request\.(body|query|params)\[["\'][^"\']+["\']\](?!\?)'
    message: "User input accessed without null check. Validate before use."
    severity: INFO
    languages: [generic]
    paths:
      include:
        - "*.dart"
