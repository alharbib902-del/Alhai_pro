# PR Check Workflow - فحص طلبات الدمج
# يعمل عند فتح أو تحديث Pull Request

name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # =====================================================
  # Code Quality Checks
  # =====================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: |
          dart format --output=none --set-exit-if-changed .
          if [ $? -ne 0 ]; then
            echo "::error::Code formatting issues found. Run 'dart format .' to fix."
            exit 1
          fi

      - name: Analyze code
        run: |
          flutter analyze --no-fatal-infos > analyze_output.txt 2>&1 || true
          if grep -q "error •" analyze_output.txt; then
            echo "::error::Analysis errors found:"
            cat analyze_output.txt
            exit 1
          fi
          cat analyze_output.txt

      - name: Check for large files
        run: |
          # Check for files larger than 1MB
          find . -type f -size +1M -not -path "./.git/*" -not -path "./build/*" | while read file; do
            echo "::warning file=$file::Large file detected (>1MB)"
          done

  # =====================================================
  # Security Checks
  # =====================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          # Check for potential secrets in code
          if grep -rE "(api[_-]?key|secret|password|token)\s*[:=]\s*['\"][^'\"]+['\"]" --include="*.dart" lib/ 2>/dev/null; then
            echo "::warning::Potential hardcoded secrets found. Please review."
          fi

      - name: Check for debug code
        run: |
          # Check for debug prints in production code
          DEBUG_COUNT=$(grep -r "debugPrint\|print(" --include="*.dart" lib/ | grep -v "kDebugMode" | wc -l)
          if [ "$DEBUG_COUNT" -gt 10 ]; then
            echo "::warning::Found $DEBUG_COUNT debug print statements. Consider wrapping in kDebugMode."
          fi

  # =====================================================
  # Test Coverage
  # =====================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          # Calculate coverage percentage
          if [ -f coverage/lcov.info ]; then
            COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+' | head -1)
            echo "Coverage: $COVERAGE%"

            # Warn if coverage is below 60%
            if (( $(echo "$COVERAGE < 60" | bc -l) )); then
              echo "::warning::Test coverage is below 60% ($COVERAGE%). Consider adding more tests."
            fi
          fi
        continue-on-error: true

      - name: Comment coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: always()
        with:
          header: coverage
          message: |
            ## Test Coverage Report

            Tests completed. Check the workflow logs for detailed coverage information.

            To view coverage locally:
            ```bash
            flutter test --coverage
            genhtml coverage/lcov.info -o coverage/html
            open coverage/html/index.html
            ```

  # =====================================================
  # Build Verification
  # =====================================================
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Verify Android build
        run: flutter build apk --debug

      - name: Verify Web build
        run: flutter build web

      - name: Build status
        run: echo "::notice::All builds completed successfully!"

  # =====================================================
  # PR Summary
  # =====================================================
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [quality, security, test, build-check]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.quality.result }}" == "failure" ]; then
            echo "::error::Quality checks failed"
            exit 1
          fi
          if [ "${{ needs.security.result }}" == "failure" ]; then
            echo "::error::Security checks failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "::error::Tests failed"
            exit 1
          fi
          if [ "${{ needs.build-check.result }}" == "failure" ]; then
            echo "::error::Build verification failed"
            exit 1
          fi
          echo "::notice::All PR checks passed! Ready for review."
