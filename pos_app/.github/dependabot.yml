# Dependabot configuration - تحديث التبعيات تلقائياً
# يفحص التبعيات أسبوعياً ويفتح PR للتحديثات

version: 2

registries:
  pub:
    type: pub
    url: https://pub.dev

updates:
  # Flutter/Dart dependencies
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    reviewers:
      - "basem"
    labels:
      - "dependencies"
      - "flutter"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      flutter-packages:
        patterns:
          - "flutter*"
          - "cupertino*"
        update-types:
          - "minor"
          - "patch"
      riverpod:
        patterns:
          - "*riverpod*"
          - "hooks_riverpod"
      drift:
        patterns:
          - "drift*"
          - "sqlite3*"
      firebase:
        patterns:
          - "firebase*"
          - "cloud_*"
      testing:
        patterns:
          - "test*"
          - "mocktail"
          - "integration_test"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
