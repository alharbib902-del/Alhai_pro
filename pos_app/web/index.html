<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Al-HAI POS - نظام نقاط البيع الذكي">

  <!-- ============================================
       SECURITY: Content Security Policy (CSP)
       ============================================ -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://www.gstatic.com;
    script-src-elem 'self' 'unsafe-inline' blob: https://www.gstatic.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https: blob:;
    font-src 'self' data: https://fonts.gstatic.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://firebaseinstallations.googleapis.com https://firebaselogging.googleapis.com https://*.sentry.io https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com https://www.wasenderapi.com https://api.wasenderapi.com;
    worker-src 'self' blob:;
    frame-ancestors 'none';
    form-action 'self';
    base-uri 'self';
    object-src 'none';
  ">

  <!-- SECURITY: Prevent clickjacking -->
  <meta http-equiv="X-Frame-Options" content="DENY">

  <!-- SECURITY: XSS Protection -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- SECURITY: Referrer Policy -->
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- ============================================
       RESPONSIVE: Viewport for Mobile/Tablet/Web
       ============================================ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

  <!-- PWA: Theme colors -->
  <meta name="theme-color" content="#10B981">
  <meta name="msapplication-TileColor" content="#10B981">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="الهاي POS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-192.png">

  <title>الهاي - نقاط البيع</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical resources -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">

  <style>
    /* Loading screen styles */
    body {
      margin: 0;
      padding: 0;
      background-color: #10B981;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .loading-logo {
      width: 150px;
      height: 150px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    .loading-logo img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.3));
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .loading-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .loading-subtitle {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 32px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Hide loading when Flutter is ready */
    .flutter-initialized .loading-container {
      display: none;
    }
  </style>
</head>

<body>
  <!-- Loading screen (shown while Flutter loads) -->
  <div class="loading-container" id="loading">
    <div class="loading-logo">
      <img src="assets/images/mascot_robot.png" alt="Al-HAI POS">
    </div>
    <div class="loading-title">نقاط البيع</div>
    <div class="loading-subtitle">Al-HAI POS</div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    // Remove loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      document.body.classList.add('flutter-initialized');
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.3s';
        setTimeout(function () { loading.remove(); }, 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
