# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks

title = "POS App Gitleaks Configuration"

[extend]
useDefault = true

# Custom Rules for POS App
[[rules]]
id = "supabase-api-key"
description = "Supabase API Key"
regex = '''(?i)(supabase[_-]?(key|anon|service|url)['":\s]*['"](eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*|[A-Za-z0-9]{20,})['"])'''
tags = ["api", "supabase"]

[[rules]]
id = "supabase-url"
description = "Supabase URL with project ref"
regex = '''https://[a-z0-9]+\.supabase\.co'''
tags = ["url", "supabase"]
[rules.allowlist]
regexes = [
  '''supabase\.co/docs''',
  '''example\.supabase\.co'''
]

[[rules]]
id = "wasender-token"
description = "WaSender API Token"
regex = '''(?i)(wasender[_-]?(api)?[_-]?(token|key)['":\s]*['"][A-Za-z0-9_-]{20,}['"])'''
tags = ["api", "wasender"]

[[rules]]
id = "firebase-config"
description = "Firebase Configuration"
regex = '''(?i)(firebase[_-]?(api[_-]?key|app[_-]?id|project[_-]?id|messaging[_-]?sender[_-]?id)['":\s]*['"][A-Za-z0-9_:-]{10,}['"])'''
tags = ["api", "firebase"]

[[rules]]
id = "flutter-env-secret"
description = "Flutter Environment Secret"
regex = '''(?i)(--dart-define[=\s]+[A-Z_]+[=\s]*['"]?[A-Za-z0-9_/-]{10,}['"]?)'''
tags = ["env", "flutter"]

[[rules]]
id = "hardcoded-pin"
description = "Hardcoded PIN Code"
regex = '''(?i)(pin['":\s]*['"][0-9]{4,6}['"])'''
tags = ["security", "pin"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "certificate"
description = "Certificate"
regex = '''-----BEGIN CERTIFICATE-----'''
tags = ["key", "certificate"]

[[rules]]
id = "password-in-code"
description = "Password in Code"
regex = '''(?i)(password|passwd|pwd)['":\s]*['"][^'"]{8,}['"]'''
tags = ["password", "secret"]
[rules.allowlist]
regexes = [
  '''password.*test''',
  '''password.*example''',
  '''password.*sample''',
  '''passwordController''',
  '''passwordField'''
]

[[rules]]
id = "bearer-token"
description = "Bearer Token"
regex = '''(?i)(bearer['":\s]+['"]?[A-Za-z0-9_-]{20,}['"]?)'''
tags = ["token", "auth"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*'''
tags = ["token", "jwt"]

# Allowlist - Files to skip
[allowlist]
description = "Global Allowlist"
paths = [
  '''test/''',
  '''.*_test\.dart''',
  '''\.github/''',
  '''docs/''',
  '''\.md$''',
  '''pubspec\.lock''',
  '''\.gitleaks\.toml'''
]
regexes = [
  '''example\.com''',
  '''test[-_]?key''',
  '''fake[-_]?token''',
  '''dummy[-_]?secret''',
  '''placeholder'''
]
