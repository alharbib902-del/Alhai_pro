<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير شاشات منصة الحي POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f7f4;--card:#fff;--text:#1a1a1a;--text2:#555;--accent:#2563eb;--accent2:#1d4ed8;--border:#e5e5e5;--green:#16a34a;--yellow:#f59e0b;--red:#ef4444;--gbg:#dcfce7;--ybg:#fef9c3;--rbg:#fee2e2;--sbg:#fff;--hover:#f1f1f1;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 12px rgba(0,0,0,.1);--radius:12px;--font:'IBM Plex Sans Arabic',sans-serif;--mono:'JetBrains Mono',monospace}
[data-theme="dark"]{--bg:#0f0f0f;--card:#1a1a1a;--text:#e5e5e5;--text2:#999;--accent:#60a5fa;--accent2:#93c5fd;--border:#2a2a2a;--gbg:#052e16;--ybg:#422006;--rbg:#450a0a;--sbg:#141414;--hover:#222;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow2:0 4px 12px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background .3s,color .3s;line-height:1.6}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.hdr{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;transition:all .3s}
.hdr-r{display:flex;align-items:center;gap:14px}
.logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.hdr-t h1{font-size:16px;font-weight:700}.hdr-t p{font-size:11px;color:var(--text2)}
.hdr-l{display:flex;align-items:center;gap:10px}
.tog{width:42px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;position:relative;border:none;transition:background .3s}
.tog::after{content:'';position:absolute;top:2px;right:2px;width:18px;height:18px;background:var(--card);border-radius:50%;transition:transform .3s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
[data-theme="dark"] .tog{background:var(--accent)}[data-theme="dark"] .tog::after{transform:translateX(-20px)}
.ham{display:none;background:0;border:0;color:var(--text);font-size:22px;cursor:pointer}
.lay{display:flex;min-height:calc(100vh - 50px)}
.sb{width:250px;background:var(--sbg);border-left:1px solid var(--border);padding:14px 0;position:sticky;top:50px;height:calc(100vh - 50px);overflow-y:auto;transition:all .3s;flex-shrink:0}
.sb-s{padding:6px 14px}.sb-s h3{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sb-l{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:7px;font-size:12px;color:var(--text);cursor:pointer;transition:background .2s}
.sb-l:hover,.sb-l.act{background:var(--hover)}
.sb-l .ct{margin-right:auto;margin-left:0;font-size:10px;background:var(--hover);padding:1px 7px;border-radius:8px;color:var(--text2)}
.mn{flex:1;padding:20px;max-width:1400px;min-width:0}
.sec{margin-bottom:40px}.sec-h{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.sec-h h2{font-size:20px;font-weight:700}.sec-h .ic{font-size:24px}
.sec-m{font-size:12px;color:var(--text2);margin-bottom:12px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;transition:all .3s;box-shadow:var(--shadow)}
.sc:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.sc .v{font-size:32px;font-weight:700;color:var(--accent);display:block;margin-bottom:2px}
.sc .l{font-size:12px;color:var(--text2)}.sc .p{font-size:13px;color:var(--green);font-weight:600}
.dw{display:flex;justify-content:center;margin:20px 0}
.don{width:160px;height:160px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center}
.don-i{width:110px;height:110px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:1;transition:background .3s}
.don-i .p{font-size:26px;font-weight:700;color:var(--accent)}.don-i .l{font-size:10px;color:var(--text2)}
.fb{position:sticky;top:50px;z-index:50;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;transition:all .3s;box-shadow:var(--shadow)}
.fb input,.fb select{font-family:var(--font);font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);transition:all .3s;outline:0}
.fb input:focus,.fb select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.fb input{flex:1;min-width:180px}.fb select{min-width:120px}
.rc{font-size:11px;color:var(--text2);margin-right:auto}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cd{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:all .3s;box-shadow:var(--shadow);overflow:hidden}
.cd:hover{box-shadow:var(--shadow2);border-color:var(--accent)}.cd.hid{display:none}
.cd-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.cd-n{font-size:14px;font-weight:700}.cd-f{font-family:var(--mono);font-size:10px;color:var(--text2);direction:ltr;text-align:right}
.cd-m{display:flex;gap:5px;margin:6px 0;flex-wrap:wrap}
.bg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:16px;font-size:10px;font-weight:600}
.bg-r{color:#fff}.bg-r.admin{background:#7c3aed}.bg-r.cashier{background:var(--green)}.bg-r.shared{background:var(--yellow);color:#000}.bg-r.manager{background:#ea580c}
.bg-w{background:var(--hover);color:var(--text2)}
.cd-ft{display:flex;flex-wrap:wrap;gap:3px;margin:6px 0}
.ft{font-size:9px;padding:2px 7px;background:var(--hover);border-radius:4px;color:var(--text2)}
.stg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:10px 0}
.sti{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 3px;border-radius:6px;background:var(--hover);font-size:9px;text-align:center;transition:background .3s}
.si{font-size:14px}.sg2{color:var(--green)}.sy{color:var(--yellow)}.sr{color:var(--red)}
.cd-e{width:100%;background:0;border:0;border-top:1px solid var(--border);margin-top:6px;padding-top:6px;color:var(--accent);font-family:var(--font);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px}
.cd-e:hover{opacity:.8}
.cd-d{display:none;margin-top:6px;padding:10px;background:var(--hover);border-radius:7px;font-size:11px;line-height:1.7}
.cd-d.op{display:block}.cd-d dt{font-weight:600;color:var(--text2)}.cd-d dd{margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.str{color:var(--yellow);letter-spacing:1px;font-size:12px}
.ts{overflow-x:auto;margin-top:14px}
.mt{width:100%;border-collapse:collapse;font-size:11px;min-width:850px}
.mt th{background:var(--card);border:1px solid var(--border);padding:8px 6px;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;transition:background .3s}
.mt th:hover{background:var(--hover)}.mt th .sa{margin-right:3px;font-size:9px;opacity:.4}
.mt th.so .sa{opacity:1;color:var(--accent)}
.mt td{border:1px solid var(--border);padding:6px;text-align:center;transition:background .3s}
.mt tr:hover td{background:var(--hover)}
.mt td:first-child{text-align:right;white-space:nowrap}.mt td:nth-child(2){font-family:var(--mono);font-size:10px;direction:ltr;text-align:left}
.cb{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);color:#fff;border:0;border-radius:7px;font-family:var(--font);font-size:12px;cursor:pointer;transition:background .2s;margin-bottom:10px}
.cb:hover{opacity:.9}
@media(max-width:1024px){.cg{grid-template-columns:repeat(2,1fr)}.sb{width:210px}}
@media(max-width:768px){.cg{grid-template-columns:1fr}.sb{position:fixed;right:0;top:50px;width:260px;z-index:99;box-shadow:var(--shadow2);transform:translateX(100%)}.sb.op{transform:translateX(0)}.ham{display:block}.mn{padding:12px}.sg{grid-template-columns:repeat(2,1fr)}.fb{flex-direction:column}.fb input,.fb select{width:100%;min-width:0}}
@media(max-width:480px){.sg{grid-template-columns:1fr}.hdr-t h1{font-size:13px}.sc .v{font-size:24px}}
@media print{.sb,.fb,.hdr,.cd-e,.cb,.ham,.tog{display:none!important}.mn{padding:0;max-width:100%}.cg{grid-template-columns:repeat(2,1fr)}.cd{break-inside:avoid;border:1px solid #ccc}.lay{display:block}}
.tl{position:relative;padding:10px 0 10px 30px;margin:16px 0}.tl::before{content:'';position:absolute;right:12px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-i{position:relative;margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);transition:all .3s}
.tl-i:hover{box-shadow:var(--shadow2)}.tl-i::before{content:'';position:absolute;right:-24px;top:16px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--card)}
.tl-d{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px}.tl-t{font-size:13px;font-weight:700;margin-bottom:4px}.tl-p{font-size:11px;color:var(--text2);line-height:1.6}
.tl-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.tl-tag{font-size:9px;padding:2px 8px;background:var(--gbg);color:var(--green);border-radius:10px;font-weight:600}
</style>
</head>

// Theme
function toggleTheme(){
  const d=document.documentElement;
  const t=d.getAttribute('data-theme')==='dark'?'':'dark';
  d.setAttribute('data-theme',t);
  localStorage.setItem('theme',t);
}
(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();

// Sidebar
function toggleSB(){document.getElementById('sb').classList.toggle('op');}

// Scroll
function scrollTo2(id){
  const el=document.getElementById(id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  document.getElementById('sb').classList.remove('op');
  document.querySelectorAll('.sb-l').forEach(l=>l.classList.remove('act'));
  event.target.closest('.sb-l')?.classList.add('act');
}

// Filter
function applyFilters(){
  const q=document.getElementById('fsearch').value.toLowerCase();
  const role=document.getElementById('frole').value;
  const db=document.getElementById('fdb').value;
  const cat=document.getElementById('fcat').value;
  let cnt=0;
  document.querySelectorAll('.cd').forEach(c=>{
    const n=(c.getAttribute('data-name')||'').toLowerCase();
    const r=c.getAttribute('data-role');
    const d=c.getAttribute('data-db');
    const ct=c.getAttribute('data-cat');
    const show=(q===''||n.includes(q))&&(role==='all'||r===role)&&(db==='all'||d===db)&&(cat==='all'||ct===cat);
    c.classList.toggle('hid',!show);
    if(show)cnt++;
  });
  document.getElementById('rc').textContent=cnt+' شاشة';
  document.querySelectorAll('.cat-section').forEach(sec=>{
    const vis=sec.querySelectorAll('.cd:not(.hid)').length;
    sec.style.display=vis?'':'none';
  });
}

// Details toggle
function togDet(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('op');
}

// Sort table
let sortDir={};
function sortTable(col){
  const table=document.getElementById('mtable');
  const tbody=table.querySelector('tbody');
  const rows=[...tbody.querySelectorAll('tr')];
  sortDir[col]=!sortDir[col];
  rows.sort((a,b)=>{
    const at=a.children[col].textContent.trim();
    const bt=b.children[col].textContent.trim();
    return sortDir[col]?at.localeCompare(bt,'ar'):bt.localeCompare(at,'ar');
  });
  rows.forEach(r=>tbody.appendChild(r));
  table.querySelectorAll('th').forEach(th=>th.classList.remove('so'));
  table.querySelector('th[data-col="'+col+'"]').classList.add('so');
}

// CSV
function copyCSV(){
  const hd=['الشاشة','الملف','الدور','DB','RTL','متجاوب','داكن','i18n','Offline','سرعة','UX'];
  let csv=hd.join(',')+String.fromCharCode(10);
  S.forEach(s=>{
    csv+=[s.name_ar,s.file,s.role,s.db.status,s.rtl.status,s.responsive.status,s.dark_mode.status,s.i18n.status,s.offline.status,s.performance.rating,s.ux.stars].join(',')+String.fromCharCode(10);
  });
  navigator.clipboard.writeText(csv).then(()=>alert('تم نسخ CSV!')).catch(()=>{});
}

// Animated counters
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const el=e.target;const end=parseInt(el.getAttribute('data-count'));
      let cur=0;const step=Math.max(1,Math.floor(end/40));
      const timer=setInterval(()=>{cur+=step;if(cur>=end){cur=end;clearInterval(timer);}el.textContent=cur;},30);
      obs.unobserve(el);
    }
  });
},{threshold:0.3});
document.querySelectorAll('[data-count]').forEach(el=>obs.observe(el));
</script>
