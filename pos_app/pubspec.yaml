name: pos_app
description: Point of Sale application for Alhai grocery stores
publish_to: 'none'  # Private package, not published to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ⭐ الحزم المشتركة (Priority)
  alhai_core:
    path: ../alhai_core
  alhai_services:
    path: ../alhai_services
  alhai_design_system:
    path: ../alhai_design_system

  # State Management (DI + ViewModels)
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Routing
  go_router: ^13.0.0

  # Local Database
  drift: ^2.14.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Backend
  supabase_flutter: ^2.3.4
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  shimmer: ^3.0.0
  permission_handler: ^11.2.0
  file_picker: ^8.1.6
  
  # Security - Biometric & PIN
  local_auth: ^2.1.8
  crypto: ^3.0.3
  
  # Firebase
  firebase_core: ^2.25.4
  firebase_crashlytics: ^3.4.15

  # URL Launcher (WhatsApp)
  url_launcher: ^6.2.4

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.12.0
  qr_flutter: ^4.1.0

  # UI helpers
  flutter_spinkit: ^5.2.0

  # Analytics & Monitoring
  firebase_analytics: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.4.1
  drift_dev: ^2.14.1

  # Linting
  flutter_lints: ^3.0.1

  # Testing
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
