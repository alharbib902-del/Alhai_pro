include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Suppress JsonKey warnings on freezed constructor parameters
    invalid_annotation_target: ignore
    # Suppress constructor ordering (common in DI and impl classes)
    sort_constructors_first: ignore
    # Suppress dangling doc comments
    dangling_library_doc_comments: ignore

linter:
  rules:
    avoid_print: false  # Allowed in example files
    prefer_const_constructors: false  # Too strict for Duration() etc.
    prefer_const_declarations: true
    prefer_final_fields: true
    use_super_parameters: false  # Optional style
