name: alhai_core
description: Core package for Alhai application - Clean Architecture implementation
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  get_it: ^7.7.0
  injectable: ^2.3.2
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  flutter_riverpod: ^2.4.9
  # R2 Image Storage
  supabase_flutter: ^2.3.4
  crypto: ^3.0.3
  image: ^4.1.0
  # HTTP client (used by CertificatePinningService)
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  flutter_lints: ^3.0.1
  mocktail: ^1.0.4
