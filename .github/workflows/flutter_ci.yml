# M12: Split from monolithic flutter_ci.yml into separate workflow files.
# Build workflows (build-android.yml, build-ios.yml, build-web.yml) trigger
# via workflow_run after this test workflow completes successfully.

name: Analyze & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # L50: Quarterly certificate rotation check.
  # Runs at midnight on the 1st day of every 3rd month (Jan, Apr, Jul, Oct).
  # Verifies pinned SSL certificate fingerprints are not expiring within 30 days.
  schedule:
    - cron: '0 0 1 */3 *'
  # Allow manual trigger for integration tests
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests (slower, includes E2E)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: analyze-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # ANALYZE (all packages and apps, including alhai_zatca)
  # ============================================================================
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Analyze all packages (includes alhai_zatca)
        run: melos run analyze

      - name: Format check
        run: melos run format:check

  # ============================================================================
  # TEST (all packages with coverage)
  # ============================================================================
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run tests with coverage
        run: melos run test:coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          # Merge all package coverage files (includes alhai_zatca)
          find . -name "lcov.info" -path "*/coverage/*" \
            -not -path "./.claude/*" | while read f; do
            if [ -s "$f" ]; then
              echo "Merging: $f"
              cat "$f" >> coverage/merged_lcov.info
            fi
          done

      - name: Generate coverage summary
        if: hashFiles('coverage/merged_lcov.info') != ''
        id: coverage
        run: |
          # Generate per-package summary
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY

          for pkg_dir in packages/*/coverage/lcov.info alhai_core/coverage/lcov.info; do
            if [ -f "$pkg_dir" ]; then
              PKG_NAME=$(echo "$pkg_dir" | sed 's|/coverage/lcov.info||' | sed 's|packages/||')
              PKG_COV=$(lcov --summary "$pkg_dir" 2>&1 | grep "lines" | grep -oP '[\d.]+%' | head -1 || echo "N/A")
              echo "| $PKG_NAME | $PKG_COV |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Total coverage
          COVERAGE=$(lcov --summary coverage/merged_lcov.info 2>&1 | grep "lines" | grep -oP '[\d.]+%' | head -1 | tr -d '%')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total coverage: ${COVERAGE}%**" >> $GITHUB_STEP_SUMMARY
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT

      - name: Check coverage threshold
        if: hashFiles('coverage/merged_lcov.info') != ''
        run: |
          COVERAGE=$(lcov --summary coverage/merged_lcov.info 2>&1 | grep "lines" | grep -oP '[\d.]+%' | head -1 | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ -n "$COVERAGE" ]; then
            # Threshold reflects current measured baseline (32.7% as of 2026-04-11).
            # Critical modules (alhai_zatca, alhai_auth, alhai_database, audit_log)
            # are heavily covered; the rest is UI widgets and settings screens.
            # Raise this ONLY when real tests are added for business logic, not
            # to hit a number. Monitor coverage delta per PR via Codecov, not
            # absolute thresholds.
            THRESHOLD=30
            if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
              echo "::error::Coverage ${COVERAGE}% is below minimum threshold ${THRESHOLD}% (regression guard)"
              exit 1
            elif (( $(echo "$COVERAGE < 50" | bc -l) )); then
              echo "::warning::Coverage ${COVERAGE}% is below recommended threshold 50%"
            else
              echo "Coverage ${COVERAGE}% meets threshold"
            fi
          fi

      - name: Upload coverage report
        if: hashFiles('coverage/merged_lcov.info') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/merged_lcov.info

  # ============================================================================
  # PLAYWRIGHT E2E TESTS (cashier web app)
  # Runs after test job passes on main, develop, and all PRs.
  # CI/CD audit: expanded from main-only to catch regressions earlier on
  # develop branch pushes and before PRs are merged into main.
  # Builds the Flutter cashier app for web, serves it, and runs Playwright.
  # ============================================================================
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test
    # CI/CD audit: runs on main, develop, and pull requests (was main-only)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build cashier web app
        run: |
          cd apps/cashier
          flutter build web --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/cashier/package-lock.json

      - name: Install Playwright dependencies
        run: |
          cd apps/cashier
          npm ci
          npx playwright install --with-deps chromium

      - name: Serve app and run E2E tests
        run: |
          cd apps/cashier
          # Serve the built web app in the background
          npx serve build/web -l 5000 &
          SERVER_PID=$!
          # Wait for server to be ready
          npx wait-on http://localhost:5000 --timeout 30000
          # Run Playwright tests
          npx playwright test || EXIT_CODE=$?
          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          exit ${EXIT_CODE:-0}
        env:
          E2E_BASE_URL: http://localhost:5000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/cashier/playwright-report/
          retention-days: 14

  # ============================================================================
  # INTEGRATION TESTS (automatic on push + PR)
  # CI/CD audit: was manual-only via workflow_dispatch. Now runs on every
  # push and pull_request so regressions are caught early. Removed `|| true`
  # from ZATCA tests so genuine failures now fail the build (previously hidden).
  # Runs heavier tests including E2E and responsive/golden tests.
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    # CI/CD audit: automatic on push + PR (removed workflow_dispatch gate)
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run responsive/golden tests
        run: melos run test:responsive

      - name: Run ZATCA integration tests
        # CI/CD audit: removed `|| true` suffix; failures now fail the build
        run: |
          cd packages/alhai_zatca
          flutter test --tags integration

  # ============================================================================
  # MOBILE APP BUILD VERIFICATION (CI/CD audit gap #5)
  # Builds a debug APK for each Flutter app in apps/ to verify mobile builds
  # don't break. Debug builds are ~3x faster than release so we keep CI quick.
  # Matrix covers: cashier, admin, admin_lite. Depends on `test` job passing.
  # ============================================================================
  build-apk:
    name: Build APK (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: test
    # Runs on pushes and pull requests (not on schedule-only cert-check triggers)
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        app: [cashier, admin, admin_lite]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build debug APK for ${{ matrix.app }}
        run: |
          cd apps/${{ matrix.app }}
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug-apk
          path: apps/${{ matrix.app }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

  # ============================================================================
  # CERTIFICATE ROTATION CHECK (L50)
  # Runs only on the quarterly schedule trigger.
  # Checks SSL certificate expiry for all pinned domains and warns if any
  # certificate expires within 30 days.
  # ============================================================================
  cert-check:
    name: Certificate Expiry Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SSL certificate expiry dates
        run: |
          DOMAINS=(
            "supabase.co"
            "api.openai.com"
          )
          WARN_DAYS=30
          EXIT_CODE=0

          for DOMAIN in "${DOMAINS[@]}"; do
            echo "Checking $DOMAIN ..."
            EXPIRY=$(echo | openssl s_client -servername "$DOMAIN" -connect "$DOMAIN:443" 2>/dev/null \
              | openssl x509 -noout -enddate 2>/dev/null \
              | cut -d= -f2)

            if [ -z "$EXPIRY" ]; then
              echo "::warning::Could not retrieve certificate for $DOMAIN"
              continue
            fi

            EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %T %Y %Z" "$EXPIRY" +%s 2>/dev/null)
            NOW_EPOCH=$(date +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

            echo "  Certificate expires: $EXPIRY ($DAYS_LEFT days left)"

            if [ "$DAYS_LEFT" -le "$WARN_DAYS" ]; then
              echo "::error::Certificate for $DOMAIN expires in $DAYS_LEFT days! Rotate pinned fingerprints NOW."
              EXIT_CODE=1
            elif [ "$DAYS_LEFT" -le 60 ]; then
              echo "::warning::Certificate for $DOMAIN expires in $DAYS_LEFT days. Plan rotation soon."
            fi
          done

          exit $EXIT_CODE

      - name: Scan for pinned fingerprints in codebase
        run: |
          echo "Searching for hardcoded certificate fingerprints..."
          grep -rn "sha256/" --include="*.dart" . || echo "No pinned fingerprints found in Dart files."
          grep -rn "ssl_pinning\|certificate_hash\|fingerprint" --include="*.dart" . || echo "No pinning references found."
