# M12: Split from monolithic flutter_ci.yml
# Android build workflow - triggers after Analyze & Test passes on main branch.

name: Build Android

on:
  workflow_run:
    workflows: ["Analyze & Test"]
    branches: [main]
    types:
      - completed

jobs:
  # ============================================================================
  # BUILD ANDROID (all mobile apps via matrix)
  # ============================================================================
  build-android:
    name: Build Android - ${{ matrix.app }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        app: [cashier, admin, admin_lite, customer_app, driver_app]
        include:
          - app: cashier
            scope: cashier
            path: apps/cashier
          - app: admin
            scope: admin
            path: apps/admin
          - app: admin_lite
            scope: admin_lite
            path: apps/admin_lite
          - app: customer_app
            scope: customer_app
            path: customer_app
          - app: driver_app
            scope: driver_app
            path: driver_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      # ======================================================================
      # SIGNING SETUP (runs only when KEYSTORE_BASE64 secret is configured)
      # When the secret is not set (e.g., on PRs), we fall through to the
      # unsigned debug build path below.
      # ======================================================================
      - name: Decode keystore (if secret exists)
        id: decode_keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/keystore.jks
          cat > ${{ matrix.path }}/android/key.properties <<EOF
          storeFile=${{ github.workspace }}/keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          echo "signed=true" >> $GITHUB_OUTPUT

      # ======================================================================
      # SIGNED RELEASE BUILDS (APK + AAB)
      # AAB is required for Play Store uploads; APK is kept for sideloading.
      # ======================================================================
      # Phase 4 §4.1 — Cert-pin fingerprints are injected via --dart-define for
      # the apps that use CertificatePinningService (cashier, admin, admin_lite).
      # customer_app/driver_app may ignore unused defines safely. Empty secrets
      # fall through to the service's debug-mode no-op, so builds don't break
      # before pins are rolled out.
      - name: Build signed release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: ${{ matrix.path }}
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_1=${{ secrets.SUPABASE_CERT_FINGERPRINT_1 }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_2=${{ secrets.SUPABASE_CERT_FINGERPRINT_2 }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_3=${{ secrets.SUPABASE_CERT_FINGERPRINT_3 }}

      - name: Build release AAB
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: ${{ matrix.path }}
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_1=${{ secrets.SUPABASE_CERT_FINGERPRINT_1 }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_2=${{ secrets.SUPABASE_CERT_FINGERPRINT_2 }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_3=${{ secrets.SUPABASE_CERT_FINGERPRINT_3 }}

      - name: Upload signed APK artifact
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release-apk
          path: ${{ matrix.path }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload AAB artifact
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release-aab
          path: ${{ matrix.path }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      # ======================================================================
      # UNSIGNED FALLBACK (runs only when KEYSTORE_BASE64 is NOT configured)
      # Used for PR testing and contributor builds where secrets aren't shared.
      # ======================================================================
      - name: Build unsigned ${{ matrix.app }} APK (fallback)
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          cd ${{ matrix.path }}
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload unsigned APK (fallback)
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release
          path: ${{ matrix.path }}/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug-symbols
          path: ${{ matrix.path }}/build/debug-info/
