# M12: Split from monolithic flutter_ci.yml
# Android build workflow - triggers after Analyze & Test passes on main branch.

name: Build Android

on:
  workflow_run:
    workflows: ["Analyze & Test"]
    branches: [main]
    types:
      - completed

jobs:
  # ============================================================================
  # BUILD ANDROID (all mobile apps via matrix)
  # ============================================================================
  build-android:
    name: Build Android - ${{ matrix.app }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        app: [cashier, admin, admin_lite, customer_app, driver_app]
        include:
          - app: cashier
            scope: cashier
            path: apps/cashier
          - app: admin
            scope: admin
            path: apps/admin
          - app: admin_lite
            scope: admin_lite
            path: apps/admin_lite
          - app: customer_app
            scope: customer_app
            path: customer_app
          - app: driver_app
            scope: driver_app
            path: driver_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build ${{ matrix.app }} APK
        run: |
          cd ${{ matrix.path }}
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release
          path: ${{ matrix.path }}/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug-symbols
          path: ${{ matrix.path }}/build/debug-info/
