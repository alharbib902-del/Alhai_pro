name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [cashier]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Determine Environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "env=production" >> $GITHUB_OUTPUT
          fi
      - name: Build Web
        run: |
          cd apps/${{ matrix.app }}
          flutter build web --no-tree-shake-icons \
            --dart-define=ENV=${{ steps.env.outputs.env }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-web-${{ steps.env.outputs.env }}
          path: apps/${{ matrix.app }}/build/web
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: cashier-web-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
          path: build/web
      - name: Deploy to Hosting
        run: |
          echo "Deploy step — configure your hosting provider here"
          echo "Artifact downloaded to build/web/"
          echo "Environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}"
          # Examples:
          # firebase deploy --only hosting
          # aws s3 sync build/web/ s3://$BUCKET_NAME
          # vercel deploy build/web/ --prod
