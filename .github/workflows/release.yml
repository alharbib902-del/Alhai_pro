name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [cashier]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Determine Environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "env=production" >> $GITHUB_OUTPUT
          fi
      - name: Build Web
        # Phase 4 §4.1 — inject cert-pin fingerprints so production builds have
        # pin enforcement wired in. On web the IO pinning path is inert, but
        # the defines are accepted by the toolchain and keep release commands
        # aligned with native builds (one secret rotation covers all).
        run: |
          cd apps/${{ matrix.app }}
          flutter build web --no-tree-shake-icons \
            --dart-define=ENV=${{ steps.env.outputs.env }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_1=${{ secrets.SUPABASE_CERT_FINGERPRINT_1 }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_2=${{ secrets.SUPABASE_CERT_FINGERPRINT_2 }} \
            --dart-define=SUPABASE_CERT_FINGERPRINT_3=${{ secrets.SUPABASE_CERT_FINGERPRINT_3 }}
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-web-${{ steps.env.outputs.env }}
          path: apps/${{ matrix.app }}/build/web
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: cashier-web-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
          path: build/web

      # ======================================================================
      # Extract semantic version from tag (e.g. refs/tags/v1.2.3 -> 1.2.3).
      # For manual workflow_dispatch runs, fall back to a timestamp-based tag
      # so the release step still has a valid version string.
      # ======================================================================
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-manual-$(date -u +%Y%m%d%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      # ======================================================================
      # Create GitHub Release with the web build + any mobile artifacts that
      # were uploaded by the build-android / build-ios workflows.
      # Marked as prerelease when the tag contains "beta" or "rc".
      # ======================================================================
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            build/web/**/*
            *.aab
            *.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======================================================================
      # Hosting deploy placeholder (kept as comments for operator reference).
      # GitHub Release above is the primary distribution mechanism for now.
      # ======================================================================
      - name: Deploy to Hosting (placeholder)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Manual deploy triggered for environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}"
          echo "Artifact downloaded to build/web/"
          # Examples:
          # firebase deploy --only hosting
          # aws s3 sync build/web/ s3://$BUCKET_NAME
          # vercel deploy build/web/ --prod
