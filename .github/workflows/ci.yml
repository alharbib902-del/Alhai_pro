# Primary CI pipeline for main branch PRs and pushes.
# Runs analyze, format check, tests, and web build smoke tests.
# For full build + deploy workflows, see build-android.yml, build-web.yml,
# and build-ios.yml which trigger via workflow_run after flutter_ci.yml.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Format Check
        run: melos run format:check
      - name: Analyze
        run: melos run analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Run Tests
        run: melos run test

  build-web:
    name: Build Web - ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        app: [admin, admin_lite, cashier, super_admin, distributor_portal]
        include:
          - app: admin
            path: apps/admin
          - app: admin_lite
            path: apps/admin_lite
          - app: cashier
            path: apps/cashier
          - app: super_admin
            path: super_admin
          - app: distributor_portal
            path: distributor_portal
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Build Web
        run: cd ${{ matrix.path }} && flutter build web --release --no-tree-shake-icons
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-web-build
          path: ${{ matrix.path }}/build/web
          retention-days: 7
