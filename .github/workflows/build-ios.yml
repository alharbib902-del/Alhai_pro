# M12: Split from monolithic flutter_ci.yml
# iOS build workflow - triggers after Analyze & Test passes on main branch.

name: Build iOS

on:
  workflow_run:
    workflows: ["Analyze & Test"]
    branches: [main]
    types:
      - completed

jobs:
  # ============================================================================
  # BUILD iOS (apps that have ios/ folder)
  # ============================================================================
  build-ios:
    name: Build iOS - ${{ matrix.app }}
    runs-on: macos-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        app: [customer_app, driver_app]
        include:
          - app: customer_app
            path: customer_app
          - app: driver_app
            path: driver_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      # ======================================================================
      # iOS SIGNING SETUP (runs only when IOS_CERTIFICATE_BASE64 is configured)
      # Imports the distribution certificate into a temporary keychain and
      # installs the provisioning profile. Falls back to --no-codesign below
      # when secrets aren't set (PR builds, contributor forks).
      # ======================================================================
      - name: Install iOS signing certificates
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Import certificate
          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Install provisioning profile
        if: env.PROVISIONING_PROFILE_BASE64 != ''
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # ======================================================================
      # SIGNED RELEASE BUILD (IPA) — only when signing secrets are present
      # ======================================================================
      - name: Build signed iOS IPA
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          cd ${{ matrix.path }}
          flutter build ipa --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload IPA artifact
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release-ipa
          path: ${{ matrix.path }}/build/ios/ipa/*.ipa
          retention-days: 14

      # ======================================================================
      # UNSIGNED FALLBACK (--no-codesign) — runs on PRs / forks without secrets
      # ======================================================================
      - name: Build iOS (no codesign, fallback)
        if: env.IOS_CERTIFICATE_BASE64 == ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          cd ${{ matrix.path }}
          flutter build ios --release --no-codesign \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload iOS debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-ios-debug-symbols
          path: ${{ matrix.path }}/build/debug-info/
          if-no-files-found: ignore
