# =============================================================================
# Deploy Distributor Portal
# =============================================================================
# Dedicated deployment pipeline for the distributor portal.
#
# Triggers: push to main when distributor_portal/** or packages/** change.
#
# Deployment targets (choose one or both via GitHub env vars):
#   1. Cloudflare Pages  (static hosting — default)
#   2. Docker / Container Registry (Railway, Render, Cloud Run, etc.)
#
# Required GitHub secrets:
#   Cloudflare:
#     - CLOUDFLARE_API_TOKEN     (Pages:Edit scoped token)
#     - CLOUDFLARE_ACCOUNT_ID    (Dashboard sidebar)
#   Docker (optional):
#     - DOCKER_REGISTRY          (e.g. ghcr.io/basem902)
#     - DOCKER_USERNAME
#     - DOCKER_PASSWORD
#   App:
#     - SUPABASE_URL
#     - SUPABASE_ANON_KEY
#     - SENTRY_DSN_DISTRIBUTOR  (read by lib/core/services/sentry_service.dart)
# =============================================================================

name: Deploy Distributor Portal

on:
  push:
    branches: [main]
    paths:
      - 'distributor_portal/**'
      - 'packages/**'
      - '.github/workflows/deploy-distributor.yml'
  pull_request:
    branches: [main]
    paths:
      - 'distributor_portal/**'
      - 'packages/**'
      - '.github/workflows/deploy-distributor.yml'
  workflow_dispatch:   # manual trigger

concurrency:
  group: deploy-distributor-${{ github.ref }}
  cancel-in-progress: false   # don't cancel in-flight deploys

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Build Flutter web
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Flutter pub get
        working-directory: distributor_portal
        run: flutter pub get

      - name: Analyze
        working-directory: distributor_portal
        run: dart analyze

      - name: Test
        working-directory: distributor_portal
        run: flutter test

      # Hardening: obfuscate Dart identifiers, split debug symbols out,
      # and disable source maps so Dart source is not served to end users.
      - name: Build web (release, obfuscated)
        working-directory: distributor_portal
        run: |
          flutter build web --release --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/web/symbols \
            --no-source-maps \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SENTRY_DSN_DISTRIBUTOR=${{ secrets.SENTRY_DSN_DISTRIBUTOR }} \
            --dart-define=FLAVOR=prod

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: distributor-portal-symbols
          path: distributor_portal/build/web/symbols
          retention-days: 90
          if-no-files-found: warn

      - name: Strip symbols from deploy directory
        working-directory: distributor_portal
        run: rm -rf build/web/symbols

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: distributor-portal-web
          path: distributor_portal/build/web
          retention-days: 14
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────
  # 2a. Deploy to Cloudflare Pages (static hosting)
  # ──────────────────────────────────────────────────────────────
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.DEPLOY_TARGET == 'cloudflare' || vars.DEPLOY_TARGET == 'both' || vars.DEPLOY_TARGET == '' }}
    environment:
      name: production
      url: https://alhai-distributor.pages.dev
    steps:
      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: distributor-portal-web
          path: build/web

      - name: Deploy to Cloudflare Pages
        id: cloudflare_deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: alhai-distributor
          directory: build/web
          # Push to main → production. PRs → preview deployments.
          branch: ${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # ─── Smoke test the deployed URL ──────────────────────────
      # Cloudflare Pages assigns a unique URL per deployment. We curl it
      # and assert that index.html serves a 200 with a Flutter marker.
      - name: Smoke test deployment
        env:
          DEPLOY_URL: ${{ steps.cloudflare_deploy.outputs.url || 'https://alhai-distributor.pages.dev' }}
        run: |
          set -euo pipefail
          echo "Smoke-testing $DEPLOY_URL"
          # Retry up to 6 × 10s in case Cloudflare propagation lags.
          for attempt in 1 2 3 4 5 6; do
            status=$(curl -sS -o /tmp/index.html -w "%{http_code}" "$DEPLOY_URL/" || echo "000")
            if [ "$status" = "200" ] && grep -q "flutter_bootstrap.js" /tmp/index.html; then
              echo "✅ Smoke test passed (HTTP $status, Flutter marker present)"
              exit 0
            fi
            echo "Attempt $attempt: HTTP $status, retrying in 10s..."
            sleep 10
          done
          echo "❌ Smoke test failed — last status: $status"
          head -100 /tmp/index.html || true
          exit 1

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.cloudflare_deploy.outputs.url }}';
            if (!url) return;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔗 **Distributor Portal preview:** ${url}\n\n_Auto-generated by deploy-distributor.yml_`
            });

  # ──────────────────────────────────────────────────────────────
  # 2b. Build & push Docker image (container hosting)
  # ──────────────────────────────────────────────────────────────
  deploy-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.DEPLOY_TARGET == 'docker' || vars.DEPLOY_TARGET == 'both' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distributor_portal/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}/${{ github.repository_owner }}/alhai-distributor:latest
            ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}/${{ github.repository_owner }}/alhai-distributor:${{ github.sha }}
          build-args: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SENTRY_DSN_DISTRIBUTOR=${{ secrets.SENTRY_DSN_DISTRIBUTOR }}
            FLAVOR=prod
          cache-from: type=gha
          cache-to: type=gha,mode=max
