name: admin_lite
description: Al-HAI Admin Lite - Quick monitoring, approvals, reports, AI
publish_to: none
version: 1.0.0-beta.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  alhai_core:
    path: ../../alhai_core
  alhai_design_system:
    path: ../../alhai_design_system
  alhai_database:
    path: ../../packages/alhai_database
  alhai_l10n:
    path: ../../packages/alhai_l10n
  alhai_auth:
    path: ../../packages/alhai_auth
  alhai_shared_ui:
    path: ../../packages/alhai_shared_ui
  alhai_ai:
    path: ../../packages/alhai_ai
  alhai_reports:
    path: ../../packages/alhai_reports
  flutter_secure_storage: ^9.0.0
  http: ^1.2.1
  crypto: ^3.0.3
  flutter_riverpod: ^2.4.9
  get_it: ^7.7.0
  go_router: ^13.0.0
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.0

  drift: ^2.14.1
  uuid: ^4.4.0
  sentry_flutter: ^9.14.0
  package_info_plus: ^8.0.0
  alhai_sync:
    path: ../../packages/alhai_sync
  url_launcher: ^6.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1
flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  # ---------------------------------------------------------------
  # To enable iOS icon generation after creating the iOS runner:
  #   1. Run: flutter create --platforms=ios .
  #   2. Change "ios: false" above to "ios: true"
  #   3. Uncomment the two lines below
  #   4. Run: dart run flutter_launcher_icons
  # ios: true
  # ios_content_mode: "scaleAspectFill"
  # ---------------------------------------------------------------
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  # Brand purple matching the center of the icon's radial gradient.
  # Must NOT be white (#FFFFFF) because the foreground chart is white and
  # would become invisible on a white adaptive background.
  adaptive_icon_background: "#6D28D9"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#6D28D9"
    theme_color: "#6D28D9"
