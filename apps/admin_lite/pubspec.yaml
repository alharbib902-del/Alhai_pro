name: admin_lite
description: Al-HAI Admin Lite - Quick monitoring, approvals, reports, AI
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  alhai_core:
    path: ../../alhai_core
  alhai_services:
    path: ../../alhai_services
  alhai_design_system:
    path: ../../alhai_design_system
  alhai_database:
    path: ../../packages/alhai_database
  alhai_sync:
    path: ../../packages/alhai_sync
  alhai_l10n:
    path: ../../packages/alhai_l10n
  alhai_auth:
    path: ../../packages/alhai_auth
  alhai_shared_ui:
    path: ../../packages/alhai_shared_ui
  alhai_ai:
    path: ../../packages/alhai_ai
  alhai_reports:
    path: ../../packages/alhai_reports
  flutter_secure_storage: ^9.0.0
  flutter_riverpod: ^2.4.9
  get_it: ^7.7.0
  go_router: ^13.0.0
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
