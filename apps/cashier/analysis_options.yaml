include: package:flutter_lints/flutter.yaml

# L107: Hardcoded-string detection
# ---------------------------------
# Flutter's built-in analyzer does not have a native "avoid_hardcoded_strings"
# rule. We enforce the following complementary rules and conventions:
#
# 1. `avoid_print` catches debug prints that sometimes contain hardcoded text.
# 2. `prefer_const_declarations` flags literals that should be const (and thus
#    easier to grep for hardcoded user-facing text).
# 3. For automated detection of hardcoded user-facing strings, integrate
#    `dart_code_metrics` (DCM) with its `avoid-returning-widgets` and
#    `prefer-extracting-callbacks` rules, or use `custom_lint` with a bespoke
#    rule that flags `Text('...')` where the string is not an `l10n.*` call.
#
#    To enable DCM:
#      a) Add `dart_code_metrics` to dev_dependencies in pubspec.yaml.
#      b) Uncomment the section below.
#
# dart_code_metrics:
#   rules:
#     - avoid-returning-widgets
#     - prefer-extracting-callbacks

analyzer:
  # Phase 3 §3.5 — Plug in `alhai_lints` via the `custom_lint` runner so
  # Alhai-specific rules (avoid_direct_material_widgets, ...) run alongside
  # `flutter_lints`. Rules are WARNING level for migration period — they do
  # not fail analyze/CI. Discover counts with: `dart run custom_lint`.
  plugins:
    - custom_lint
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - 'lib/l10n/generated/**'
  errors:
    invalid_annotation_target: ignore
    sort_constructors_first: ignore
    dangling_library_doc_comments: ignore

linter:
  rules:
    # Core lint rules
    avoid_print: true
    prefer_const_constructors: false
    prefer_const_declarations: true
    prefer_final_fields: true
    # L107: Additional rules that help catch hardcoded strings indirectly
    prefer_interpolation_to_compose_strings: true
    use_full_hex_values_for_flutter_colors: true
    no_adjacent_strings_in_list: true
