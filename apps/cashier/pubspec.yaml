name: cashier
description: Al-HAI Cashier - Professional POS for cashiers (100% offline)
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Foundations
  alhai_core:
    path: ../../alhai_core
  alhai_services:
    path: ../../alhai_services
  alhai_design_system:
    path: ../../alhai_design_system

  # Infra
  alhai_database:
    path: ../../packages/alhai_database
  alhai_sync:
    path: ../../packages/alhai_sync
  alhai_l10n:
    path: ../../packages/alhai_l10n

  # UI Features
  alhai_auth:
    path: ../../packages/alhai_auth
  alhai_shared_ui:
    path: ../../packages/alhai_shared_ui
  alhai_pos:
    path: ../../packages/alhai_pos
  alhai_reports:
    path: ../../packages/alhai_reports

  # Images
  cached_network_image: ^3.3.1

  # QR Code (ZATCA)
  qr_flutter: ^4.1.0

  # Security
  flutter_secure_storage: ^9.0.0

  # Database
  drift: ^2.14.1

  # App infra
  flutter_riverpod: ^2.4.9
  get_it: ^7.7.0
  go_router: ^13.0.0
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.0
  # L42: CSV is used here for legacy seedFromCsv() in development only.
  # The canonical CSV parsing lives in alhai_database. This direct dependency
  # can be removed once CSV seeding is migrated to alhai_database's seeder.
  csv: ^6.0.0
  uuid: ^4.4.0
  sentry_flutter: ^9.14.0
  intl: any
  # Printer packages removed for web builds (esc_pos_utils, esc_pos_printer, esc_pos_bluetooth, sunmi_printer_plus)
  # Stub implementations in lib/services/printing/ provide no-op fallbacks

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
