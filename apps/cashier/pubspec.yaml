name: cashier
description: Al-HAI Cashier - Professional POS for cashiers (100% offline)
publish_to: none
version: 1.3.0+4

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Foundations
  alhai_core:
    path: ../../alhai_core
  alhai_design_system:
    path: ../../alhai_design_system

  # Infra
  alhai_database:
    path: ../../packages/alhai_database
  alhai_sync:
    path: ../../packages/alhai_sync
  alhai_l10n:
    path: ../../packages/alhai_l10n

  # UI Features
  alhai_auth:
    path: ../../packages/alhai_auth
  alhai_shared_ui:
    path: ../../packages/alhai_shared_ui
  alhai_pos:
    path: ../../packages/alhai_pos
  alhai_reports:
    path: ../../packages/alhai_reports

  # Images
  cached_network_image: ^3.3.1

  # ZATCA e-invoicing (Phase 2)
  alhai_zatca:
    path: ../../packages/alhai_zatca

  # QR Code (ZATCA)
  qr_flutter: ^4.1.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Security
  flutter_secure_storage: ^9.0.0

  # Database
  drift: ^2.14.1

  # App infra
  flutter_riverpod: ^2.4.9
  get_it: ^7.7.0
  go_router: ^13.0.0
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.0
  uuid: ^4.4.0
  sentry_flutter: ^9.14.0
  intl: ^0.20.2
  web: ^1.1.0
  # Printer packages removed for web builds (esc_pos_utils, esc_pos_printer, esc_pos_bluetooth, sunmi_printer_plus)
  # Stub implementations in lib/services/printing/ provide no-op fallbacks

  # Skeleton loaders (see _buildSkeletonRow inline helper in list screens)
  shimmer: ^3.0.0

  # Audio feedback (Phase 2 §2.5 — SoundService for barcode beep / sale
  # success / error buzz). The assets under assets/sounds/ are 0-byte
  # placeholders; SoundService.init swallows load failures and remains
  # a no-op until real MP3 files ship.
  just_audio: ^0.9.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  mocktail: ^1.0.4
  # Phase 3 §3.5 — custom lint rules enforcing design-system wrappers.
  # Currently warnings only (transitional). `alhai_lints` ships a single
  # rule (avoid_direct_material_widgets) flagging raw Material widgets
  # where an AlhaiDS wrapper exists. Discover violations via:
  #   cd apps/cashier && dart run custom_lint
  alhai_lints:
    path: ../../packages/alhai_lints
  custom_lint: ^0.7.0
  # Native splash generator; run `dart run flutter_native_splash:create`
  # once the brand splash PNGs are placed under assets/images/.
  flutter_native_splash: ^2.4.0
  # Phase 5 §5.1 — Golden tests. Rendering is platform-sensitive: goldens
  # must be generated and compared on the same OS/font stack. CI runs on
  # Ubuntu, so golden masters live under `test/goldens/` committed from
  # CI and any local run on Windows/macOS skips the comparison (see
  # `test/goldens/golden_config.dart`).
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/sounds/

# Native splash config (no assets generated yet — uncomment image paths
# and re-run `dart run flutter_native_splash:create` once brand art ships).
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  # image: assets/images/splash.png
  # image_dark: assets/images/splash_dark.png
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
  web: false  # web uses CanvasKit loader
  fullscreen: false
