features:
  - name: User Authentication
    description: 2-step login flow with phone number and OTP verification, background email auth
    files:
      - lib/router/cashier_router.dart
      - lib/main.dart
    entry_route: /login
    user_interactions:
      - Enter phone number
      - Submit phone number
      - Enter OTP code received via SMS
      - Verify OTP to complete login
      - Select store from available stores
    api_calls:
      - method: POST
        endpoint: Supabase Auth (phone OTP)
    auth_required: false
  - name: Point of Sale
    description: Main POS screen with product catalog, cart management, barcode scanning, and checkout
    files:
      - lib/router/cashier_router.dart
      - lib/ui/cashier_shell.dart
    entry_route: /pos
    user_interactions:
      - Browse products by category
      - Search products by name or barcode
      - Tap product to add to cart
      - Adjust quantity in cart
      - Remove items from cart
      - Apply discounts
      - Scan barcode with barcode gun
      - Hold invoice for later
      - Proceed to payment
    api_calls: []
    auth_required: true
  - name: Payment Processing
    description: Multi-method payment with cash, card, mixed, and credit account options
    files:
      - lib/router/cashier_router.dart
    entry_route: /pos/payment
    user_interactions:
      - Select payment method (cash, card, mixed, credit)
      - Enter cash amount tendered
      - View change due calculation
      - Split payment across methods
      - Link payment to customer credit account
      - Complete payment and print receipt
    api_calls: []
    auth_required: true
  - name: Sales History
    description: View past sales, reprint receipts, process exchanges
    files:
      - lib/screens/sales/sales_history_screen.dart
      - lib/screens/sales/sale_detail_screen.dart
      - lib/screens/sales/reprint_receipt_screen.dart
      - lib/screens/sales/exchange_screen.dart
    entry_route: /sales
    user_interactions:
      - View list of past sales with date filtering
      - Tap sale to view details
      - Reprint receipt for a sale
      - Process product exchange
      - View sale totals and payment method
    api_calls: []
    auth_required: true
  - name: Customer Management
    description: Manage customers, accounts, ledgers, invoices, and credit
    files:
      - lib/screens/customers/customer_accounts_screen.dart
      - lib/screens/customers/customer_ledger_screen.dart
      - lib/screens/customers/new_transaction_screen.dart
      - lib/screens/customers/apply_interest_screen.dart
      - lib/screens/customers/create_invoice_screen.dart
    entry_route: /customers
    user_interactions:
      - View customer list
      - Search customers by name or phone
      - View customer account balance
      - View customer transaction ledger
      - Create manual transaction (debit/credit)
      - Apply interest to customer balance
      - Create invoice for customer
    api_calls: []
    auth_required: true
  - name: Inventory Management
    description: Track stock levels, add/remove inventory, transfers, stock takes, wastage
    files:
      - lib/screens/inventory/add_inventory_screen.dart
      - lib/screens/inventory/edit_inventory_screen.dart
      - lib/screens/inventory/remove_inventory_screen.dart
      - lib/screens/inventory/transfer_inventory_screen.dart
      - lib/screens/inventory/stock_take_screen.dart
      - lib/screens/inventory/wastage_screen.dart
    entry_route: /inventory
    user_interactions:
      - View inventory list with stock levels
      - Add stock to a product
      - Remove stock from a product
      - Transfer stock between locations
      - Perform physical stock count
      - Record product wastage
      - View inventory alerts for low stock
    api_calls: []
    auth_required: true
  - name: Product Management
    description: Add products quickly, edit prices, manage categories, print barcodes
    files:
      - lib/screens/products/quick_add_product_screen.dart
      - lib/screens/products/edit_price_screen.dart
      - lib/screens/products/cashier_categories_screen.dart
      - lib/screens/products/print_barcode_screen.dart
      - lib/screens/products/price_labels_screen.dart
    entry_route: /products
    user_interactions:
      - Quick add product with name, price, barcode
      - Edit product selling price
      - Manage product categories
      - Select products and print barcode labels
      - Generate price label sheets
    api_calls: []
    auth_required: true
  - name: Shift Management
    description: Open/close shifts, track cash, daily summaries
    files:
      - lib/screens/shifts/shift_open_screen.dart
      - lib/screens/shifts/shift_close_screen.dart
      - lib/screens/shifts/daily_summary_screen.dart
      - lib/screens/shifts/cash_in_out_screen.dart
    entry_route: /shifts
    user_interactions:
      - Open shift with opening cash amount
      - Close shift with closing cash reconciliation
      - Record cash in/out transactions
      - View daily summary with totals
      - View shift details and discrepancies
    api_calls: []
    auth_required: true
  - name: Offers and Promotions
    description: View active offers, manage coupon codes and bundle deals
    files:
      - lib/screens/offers/active_offers_screen.dart
      - lib/screens/offers/coupon_code_screen.dart
      - lib/screens/offers/bundle_deals_screen.dart
    entry_route: /offers/active
    user_interactions:
      - View list of active promotional offers
      - Create and manage coupon codes
      - Configure bundle deal pricing
      - Activate or deactivate offers
    api_calls: []
    auth_required: true
  - name: Reports
    description: Generate sales, payment, and custom reports
    files:
      - lib/screens/reports/payment_reports_screen.dart
      - lib/screens/reports/custom_report_screen.dart
    entry_route: /reports
    user_interactions:
      - Select report type
      - Choose date range for report
      - View payment breakdown by method
      - Build custom report with filters
      - Export report data
    api_calls: []
    auth_required: true
  - name: Settings
    description: Configure store, tax, receipt, printers, users, backup
    files:
      - lib/screens/settings/cashier_settings_screen.dart
      - lib/screens/settings/store_info_screen.dart
      - lib/screens/settings/tax_settings_screen.dart
      - lib/screens/settings/receipt_settings_screen.dart
      - lib/screens/settings/printer_settings_screen.dart
      - lib/screens/settings/payment_devices_screen.dart
      - lib/screens/settings/keyboard_shortcuts_screen.dart
      - lib/screens/settings/users_permissions_screen.dart
      - lib/screens/settings/backup_screen.dart
    entry_route: /settings
    user_interactions:
      - Update store name and information
      - Configure tax rates and ZATCA settings
      - Customize receipt template
      - Add and configure thermal printers
      - Manage payment devices
      - Configure keyboard shortcuts
      - Manage user roles and permissions
      - Create and restore database backups
      - Change language and theme
    api_calls: []
    auth_required: true
  - name: Purchases
    description: Receive goods and create purchase requests
    files:
      - lib/screens/purchases/cashier_receiving_screen.dart
      - lib/screens/purchases/cashier_purchase_request_screen.dart
    entry_route: /purchases/receiving
    user_interactions:
      - Record received goods with quantities
      - Create purchase request for needed items
      - Review and confirm received items
    api_calls: []
    auth_required: true
  - name: Returns and Refunds
    description: Process returns, refunds, and void transactions
    files:
      - lib/router/cashier_router.dart
      - lib/screens/payment/split_refund_screen.dart
    entry_route: /returns
    user_interactions:
      - Look up original sale for return
      - Select items to return
      - Process refund to original payment method
      - Void entire transaction
      - Split refund across methods
    api_calls: []
    auth_required: true
  - name: Onboarding
    description: First-time user onboarding flow
    files:
      - lib/screens/onboarding/onboarding_screen.dart
    entry_route: /onboarding
    user_interactions:
      - Swipe through onboarding pages
      - View feature highlights
      - Complete onboarding to proceed to login
    api_calls: []
    auth_required: false
known_limitations:
  - issue: App is offline-first with local SQLite database; most API calls go through Supabase sync
    location: lib/data/repositories/
    impact: All data operations work offline, sync happens in background when online
  - issue: Printer services use stub implementations on web platform
    location: lib/services/printing/
    impact: Physical printing not available on web, only preview
  - issue: Authentication requires Supabase backend for OTP verification
    location: lib/router/cashier_router.dart
    impact: Login flow requires network connectivity
