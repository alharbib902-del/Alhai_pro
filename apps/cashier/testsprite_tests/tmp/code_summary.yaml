version: "2"
type: frontend
tech_stack:
  - Dart
  - Flutter
  - Material Design (alhai_design_system)
  - Riverpod (flutter_riverpod)
  - GoRouter
  - Drift (SQLite / WASM on web)
  - Supabase
  - GetIt (DI)
  - Sentry
