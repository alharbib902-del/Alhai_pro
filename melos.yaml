# TODO(L04): Implement a versioning strategy for all apps. Currently all apps are at
# 1.0.0+1. Consider using melos versioning (melos version) with conventional
# commits, or a manual per-app versioning scheme before first production release.
#
# L36: Path dependency convention
# ──────────────────────────────
# All packages live under packages/ and all apps live under apps/ OR at the repo
# root. This means path dependencies follow two patterns:
#
#   From an app under apps/<app>/pubspec.yaml:
#     alhai_core:           { path: ../../alhai_core }
#     alhai_database:       { path: ../../packages/alhai_database }
#
#   From a package under packages/<pkg>/pubspec.yaml:
#     alhai_core:           { path: ../../alhai_core }
#     <sibling package>:    { path: ../<sibling> }
#
#   From a root-level app (customer_app, driver_app, super_admin, distributor_portal):
#     alhai_core:           { path: ../alhai_core }
#     alhai_database:       { path: ../packages/alhai_database }
#
# Keep these patterns consistent when adding new packages or apps. Melos resolves
# all paths below automatically via the packages glob list.
name: alhai_monorepo

packages:
  # Apps inside apps/ directory
  - apps/**
  # Shared packages
  - packages/**
  # Root-level shared libraries
  - alhai_core
  - alhai_services
  - alhai_design_system
  # Root-level apps (to be moved under apps/ in a future migration)
  - customer_app
  - distributor_portal
  - driver_app
  - super_admin

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    run: melos exec -c 6 -- flutter analyze
    description: Run analyzer in all packages and apps

  test:
    run: melos exec -c 6 -- flutter test
    description: Run tests in all packages and apps

  format:
    run: melos exec -- dart format .
    description: Format all packages and apps

  get:
    run: melos bootstrap
    description: Bootstrap workspace

  codegen:
    run: melos exec -- dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      dependsOn: build_runner
    description: Run code generation (Drift, Injectable, Freezed)

  build:cashier:apk:
    run: melos exec --scope="cashier" -- flutter build apk
    description: Build Cashier APK

  build:admin:web:
    run: melos exec --scope="admin" -- flutter build web
    description: Build Admin Web

  build:lite:apk:
    run: melos exec --scope="admin_lite" -- flutter build apk
    description: Build Admin Lite APK

  clean:
    run: melos exec -- flutter clean
    description: Clean all packages and apps

  format:check:
    run: melos exec -- dart format --set-exit-if-changed .
    description: Check formatting without modifying (CI)

  test:coverage:
    run: melos exec -c 4 -- flutter test --coverage
    description: Run tests with coverage reporting

  build:customer:apk:
    run: melos exec --scope="customer_app" -- flutter build apk
    description: Build Customer App APK

  build:driver:apk:
    run: melos exec --scope="driver_app" -- flutter build apk
    description: Build Driver App APK

  build:super-admin:web:
    run: melos exec --scope="super_admin" -- flutter build web --no-tree-shake-icons
    description: Build Super Admin Web

  build:distributor:web:
    run: melos exec --scope="distributor_portal" -- flutter build web --no-tree-shake-icons
    description: Build Distributor Portal Web

  build:all:
    run: |
      melos run build:cashier:apk
      melos run build:admin:web
      melos run build:lite:apk
      melos run build:customer:apk
      melos run build:driver:apk
      melos run build:super-admin:web
      melos run build:distributor:web
    description: Build all apps

  deps:check:
    run: melos exec -- flutter pub outdated
    description: Check outdated dependencies across workspace

  fix:
    run: melos exec -- dart fix --apply
    description: Apply dart fix suggestions across workspace

  # L80: Responsive / golden layout tests.
  # Runs tests tagged 'responsive' across all packages.
  # Tag your responsive tests with @Tags(['responsive']) and place them in
  # test/responsive/ directories. These tests should use golden file comparisons
  # at multiple breakpoints (mobile 375px, tablet 768px, desktop 1440px).
  test:responsive:
    run: >
      melos exec -c 4 --
      flutter test --tags responsive --dart-define=GOLDEN_TEST=true
    description: Run responsive/golden layout tests across all packages
    packageFilters:
      dirExists: test/responsive

  test:responsive:update:
    run: >
      melos exec -c 4 --
      flutter test --tags responsive --update-goldens --dart-define=GOLDEN_TEST=true
    description: Update golden files for responsive layout tests
    packageFilters:
      dirExists: test/responsive

  # ZATCA-specific test scripts
  test:zatca:
    run: melos exec --scope="alhai_zatca" -- flutter test --reporter expanded
    description: Run all ZATCA package tests

  test:zatca:coverage:
    run: melos exec --scope="alhai_zatca" -- flutter test --coverage --reporter expanded
    description: Run ZATCA tests with coverage reporting

  test:zatca:xml:
    run: melos exec --scope="alhai_zatca" -- flutter test test/xml/ --reporter expanded
    description: Run ZATCA XML generation tests only

  test:zatca:signing:
    run: melos exec --scope="alhai_zatca" -- flutter test test/signing/ --reporter expanded
    description: Run ZATCA signing tests only

  analyze:strict:
    run: >
      melos exec -c 4 --
      dart analyze --fatal-infos --fatal-warnings
    description: Run strict analysis (fatal infos + warnings) on all packages
    packageFilters:
      scope:
        - alhai_zatca
        - alhai_auth
        - alhai_core
