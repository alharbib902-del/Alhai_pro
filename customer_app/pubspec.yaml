name: customer_app
description: Customer mobile application for Alhai grocery stores
publish_to: 'none'
version: 1.0.0-beta.1+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ⭐ الحزم المشتركة (Priority)
  alhai_core:
    path: ../alhai_core
  alhai_design_system:
    path: ../alhai_design_system
  alhai_zatca:
    path: ../packages/alhai_zatca

  # State Management (DI + ViewModels)
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  get_it: ^7.7.0
  injectable: ^2.3.2

  # Routing
  go_router: ^13.0.0

  # Backend
  supabase_flutter: ^2.3.4
  http: ^1.2.1
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utils
  intl: any
  uuid: ^4.4.0
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0

  # UI helpers
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

  # Maps & Location (for store locator)
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

  # URL launcher
  url_launcher: ^6.2.2

  # Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^17.2.3

  # Crash reporting
  sentry_flutter: ^9.14.0
  qr_flutter: ^4.1.0
  hijri: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.4.1

  # Linting
  flutter_lints: ^3.0.1

  # Testing
  mocktail: ^1.0.4
  faker: ^2.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
