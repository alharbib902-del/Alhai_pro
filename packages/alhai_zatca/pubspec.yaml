name: alhai_zatca
description: ZATCA Phase 2 e-invoicing - XML generation, digital signing, API integration
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # XML
  xml: ^6.5.0

  # Cryptography
  pointycastle: ^3.9.1
  asn1lib: ^1.5.3
  basic_utils: ^5.7.0
  crypto: ^3.0.3

  # Network
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.4.9
  get_it: ^7.7.0

  # Persistence
  shared_preferences: ^2.2.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.4
