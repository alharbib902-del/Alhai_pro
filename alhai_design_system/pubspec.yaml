name: alhai_design_system
description: Production-grade design system for Alhai multi-app suite (POS/Consumer/Delivery/Merchant)
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Locale-aware number formatting
  intl: ^0.19.0
  # R2 Image Storage & Caching
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  # Optional: google_fonts for dev/fallback only
  # google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansDevanagari-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansBengali-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700

# Download fonts from:
# Arabic: https://fonts.google.com/specimen/Tajawal
# Hindi: https://fonts.google.com/noto/specimen/Noto+Sans+Devanagari
# Bengali: https://fonts.google.com/noto/specimen/Noto+Sans+Bengali
# Place files in: assets/fonts/
